    async function approveQC(orderId) {
      const order = DATA.orders.find(o => o.id === orderId);
      if (!order) return;

      // Auto-beräkna pris om det saknas
      const knives = order.actual_knife_count || order.estimated_knife_count || 0;
      if (!order.price_per_knife && knives > 0) {
        order.price_per_knife = knives <= 2 ? 170 : knives <= 5 ? 140 : 120;
        order.custom_total_price = knives * order.price_per_knife;
      }

      order.status = 'ready';
      if (!order.status_history) order.status_history = [];
      order.status_history.push({ status: 'ready', timestamp: now(), by: CURRENT_USER.name.split(' ')[0].toLowerCase() });
      order.updated_at = now();

      await saveJSON('orders.json', { orders: DATA.orders });

      // Re-render
      const activeNav = document.querySelector('.sidebar-nav a.active');
      if (activeNav) renderView(activeNav.dataset.view);
    }

    function claimOrder(orderId) {
      // Legacy — stödjer fortfarande enkel claim för admin
      const order = DATA.orders.find(o => o.id === orderId);
      if (!order) return;
      order.assigned_to = CURRENT_USER.id;
      if (order.status === 'picked_up' || order.status === 'registered') {
        order.status = 'sharpening';
        order.status_history.push({ status: 'sharpening', timestamp: now(), by: CURRENT_USER.name.toLowerCase().split(' ')[0] });
      }
      saveOrders();
      const role = CURRENT_USER.role;
      renderView(role === 'admin' ? 'admin-log' : 'slipare-home');
    }

    function claimKnives(orderId) {
      const order = DATA.orders.find(o => o.id === orderId);
      if (!order) return;
      const input = document.getElementById('claim-' + orderId);
      const count = parseInt(input?.value) || 0;
      if (count <= 0) return;

      if (!order.sharpeners) order.sharpeners = [];

      // Kolla att sliparen inte redan finns
      if (order.sharpeners.some(s => s.user_id === CURRENT_USER.id)) return;

      order.sharpeners.push({
        user_id: CURRENT_USER.id,
        name: CURRENT_USER.name.split(' ')[0],
        knife_count: count,
        done: false,
        claimed_at: now()
      });

      if (order.status === 'picked_up' || order.status === 'registered') {
        order.status = 'sharpening';
        order.status_history.push({ status: 'sharpening', timestamp: now(), by: CURRENT_USER.name.toLowerCase().split(' ')[0] });
      }

      saveOrders();
      renderView('slipare-home');
    }

    function updateMyClaim(orderId, newCount) {
      const order = DATA.orders.find(o => o.id === orderId);
      if (!order || !order.sharpeners) return;
      const myEntry = order.sharpeners.find(s => s.user_id === CURRENT_USER.id);
      if (!myEntry || myEntry.done) return;
      const val = parseInt(newCount) || 1;
      if (val < (myEntry.knives_done || 0)) return; // Kan inte sänka under redan loggade
      myEntry.knife_count = val;
      saveOrders();
      renderView(CURRENT_USER.role === 'slipare' ? 'slipare-home' : 'admin-log');
    }

    function logOneKnife(orderId) {
      const order = DATA.orders.find(o => o.id === orderId);
      if (!order || !order.sharpeners) return;
      const myEntry = order.sharpeners.find(s => s.user_id === CURRENT_USER.id);
      if (!myEntry || myEntry.done) return;

      if (!myEntry.knives_done) myEntry.knives_done = 0;
      myEntry.knives_done += 1;

      // Logga i timelog
      let entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
      if (!entry) { entry = { user_id: CURRENT_USER.id, date: today(), clock_in: null, clock_out: null, knives_sharpened: 0, stops_completed: 0, notes: '', sharpened_orders: [] }; TIMELOG.push(entry); }
      entry.knives_sharpened = (entry.knives_sharpened || 0) + 1;

      // Om alla knivar klara → markera done
      if (myEntry.knives_done >= myEntry.knife_count) {
        myEntry.done = true;
        myEntry.done_at = now();
        if (!entry.sharpened_orders) entry.sharpened_orders = [];
        entry.sharpened_orders.push({ order_id: orderId, knives: myEntry.knife_count, timestamp: now() });

        // Kolla om ALLA slipare klara
        if (order.sharpeners.every(s => s.done)) {
          order.status = 'quality_check';
          order.status_history.push({ status: 'quality_check', timestamp: now(), by: 'alla slipare' });
        }
      }

      saveTimelog();
      saveOrders();
      renderView(CURRENT_USER.role === 'slipare' ? 'slipare-home' : 'admin-log');
    }

    function markMyKnivesDone(orderId) {
      const card = event?.target?.closest?.('.card');
      if (card) card.classList.add('card-done');

      const order = DATA.orders.find(o => o.id === orderId);
      if (!order || !order.sharpeners) return;

      const myEntry = order.sharpeners.find(s => s.user_id === CURRENT_USER.id);
      if (!myEntry) return;
      myEntry.done = true;
      myEntry.done_at = now();

      // Logga resterande knivar (de som inte redan loggats via +1)
      const alreadyLogged = myEntry.knives_done || 0;
      const remaining = (myEntry.knife_count || 0) - alreadyLogged;
      myEntry.knives_done = myEntry.knife_count;

      let entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
      if (!entry) { entry = { user_id: CURRENT_USER.id, date: today(), clock_in: null, clock_out: null, knives_sharpened: 0, stops_completed: 0, notes: '', sharpened_orders: [] }; TIMELOG.push(entry); }
      if (remaining > 0) entry.knives_sharpened = (entry.knives_sharpened || 0) + remaining;
      if (!entry.sharpened_orders) entry.sharpened_orders = [];
      entry.sharpened_orders.push({ order_id: orderId, knives: myEntry.knife_count, timestamp: now() });

      // Kolla om ALLA slipare är klara → quality_check
      const allDone = order.sharpeners.every(s => s.done);
      if (allDone) {
        order.status = 'quality_check';
        order.status_history.push({ status: 'quality_check', timestamp: now(), by: 'alla slipare' });
      }

      saveTimelog();
      saveOrders();

      setTimeout(() => renderView('slipare-home'), 500);
    }

    function getAvoidHighways() { return sessionStorage.getItem('avoid_highways') !== 'false'; }
    function setAvoidHighways(val) { sessionStorage.setItem('avoid_highways', val); renderView('forare-route'); }

    function getMapsUrl(destination, avoidHighways) {
      // Rensa "None" från adresser
      const cleanDest = destination.replace(/\bNone\b/g, '').replace(/,\s*,/g, ',').replace(/\s+/g, ' ').trim();
      if (avoidHighways) {
        // Google Maps App URL med avoid=highways (fungerar på mobil)
        return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(cleanDest)}&travelmode=driving&avoid=highways`;
      }
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(cleanDest)}&travelmode=driving`;
    }

    // Uppskattad km per stopp (baserat på areas.json distances)
    function estimateRouteKm(stops) {
      // Grov uppskattning: homebase Nacka → områden
      const areaKm = {
        'AREA-NACKA-C': 3,
        'AREA-NACKA-SALTSJOBADEN': 8,
        'AREA-NACKA-BOO': 6,
        'AREA-NACKA-ALTA': 7,
        'AREA-VARMDO-C': 14,
        'AREA-VARMDO-HALSO': 22,
        'AREA-VARMDO-INGARSO': 18
      };
      const withinAreaKm = 2; // km mellan stopp inom samma område

      if (!stops.length) return 0;

      let totalKm = 0;
      let prevArea = 'AREA-NACKA-C'; // homebase

      stops.forEach(s => {
        const area = s.area_id || 'AREA-NACKA-C';
        if (area !== prevArea) {
          // Resa till nytt område
          totalKm += Math.abs((areaKm[area]||8) - (areaKm[prevArea]||3));
          prevArea = area;
        } else {
          totalKm += withinAreaKm;
        }
      });

      // Tillbaka till homebase
      totalKm += areaKm[prevArea] || 8;
      // Första resan ut
      totalKm += areaKm[stops[0]?.area_id || 'AREA-NACKA-C'] || 3;

      return Math.round(totalKm);
    }

      const avoidHw = getAvoidHighways();
      const estimatedKm = estimateRouteKm(stops);
      const user = USERS.find(u => u.id === CURRENT_USER.id);
      const todayLog = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());

      // Rutt-header med km och motorväg-toggle

            <div style="display:flex;gap:0.75rem;align-items:center;">
              ${estimatedKm > 0 ? `<span style="font-size:0.85rem;color:var(--gray-500);">~${estimatedKm} km</span>` : ''}
              ${user?.pay_type === 'per_km' && user.pay_rate && estimatedKm ? `<span style="font-size:0.85rem;font-weight:600;color:var(--green);">~${estimatedKm * user.pay_rate} kr</span>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button onclick="setAvoidHighways(true)" style="flex:1;padding:0.5rem;border:2px solid ${avoidHw ? 'var(--accent)' : 'var(--gray-300)'};background:${avoidHw ? 'var(--accent-light)' : 'var(--white)'};color:${avoidHw ? 'var(--accent)' : 'var(--gray-500)'};border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:${avoidHw ? '700' : '400'};">
              &#128739; Undvik motorväg
            </button>
            <button onclick="setAvoidHighways(false)" style="flex:1;padding:0.5rem;border:2px solid ${!avoidHw ? 'var(--accent)' : 'var(--gray-300)'};background:${!avoidHw ? 'var(--accent-light)' : 'var(--white)'};color:${!avoidHw ? 'var(--accent)' : 'var(--gray-500)'};border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:${!avoidHw ? '700' : '400'};">
              &#128663; Snabbaste väg
            </button>
          </div>
        </div>
      `);
      const section = main.querySelector('.section:last-child');

      if (!stops.length) {
        section.insertAdjacentHTML('beforeend', '<div style="text-align:center;padding:2rem;color:var(--gray-400);"><div style="font-size:2rem;margin-bottom:0.5rem;">&#128664;</div>Inga stopp planerade idag</div>');
        return;
      }

      // Stopp-kort
      stops.forEach((s, i) => {
        const mapsUrl = getMapsUrl(s.address, avoidHw);
        const knives = s.estimated_knives || s.knives || '';
        section.insertAdjacentHTML('beforeend', `
          <div class="card slide-in" style="padding:1rem;margin-bottom:0.75rem;border-left:4px solid ${s.completed ? 'var(--green)' : 'var(--accent)'};${s.completed ? 'opacity:0.5;' : ''}animation-delay:${i*0.05}s;">
            <div style="display:flex;align-items:center;gap:0.75rem;">
              <div style="text-align:center;min-width:32px;">
                <div style="font-size:1.4rem;font-weight:800;color:${s.completed ? 'var(--green)' : 'var(--accent)'};">${s.completed ? '&#10003;' : i+1}</div>
              </div>
              <span class="stop-type ${s.type}" style="font-size:0.7rem;padding:0.2rem 0.5rem;">${s.type==='pickup'?'Hämt':'Lev'}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:1rem;">${s.customer_name}</div>
                <div style="font-size:0.85rem;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.address}</div>
                ${s.time_window ? `<div style="font-size:0.75rem;color:var(--gray-400);margin-top:0.15rem;">${s.time_window}</div>` : ''}
                ${s.notes ? `<div style="font-size:0.75rem;color:var(--gray-400);font-style:italic;">${s.notes}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;">
                <a href="${mapsUrl}" target="_blank" style="padding:0.45rem 0.7rem;font-size:0.8rem;background:var(--blue);color:var(--white);border-radius:var(--radius);text-decoration:none;text-align:center;font-weight:600;">&#128506; Kör</a>
                <button class="stop-done-btn ${s.completed?'completed':''}" onclick="markStop(${i})" ${s.completed?'disabled':''} style="padding:0.45rem 0.7rem;font-size:0.8rem;background:${s.completed ? 'var(--green)' : 'var(--gray-200)'};color:${s.completed ? 'var(--white)' : 'var(--gray-600)'};border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-weight:600;">${s.completed?'&#10003; Klar':'Klar'}</button>
              </div>
            </div>
          </div>
        `);
      });

      // Km-sammanfattning + auto-log
      const done = stops.filter(s => s.completed).length;
      if (done === stops.length && stops.length > 0) {
        // Alla stopp klara — visa sammanfattning och auto-logga km
        const loggedKm = todayLog?.km_driven || 0;
        section.insertAdjacentHTML('beforeend', `
          <div style="margin-top:1rem;padding:1.25rem;background:var(--green-light);border-radius:var(--radius);border:1px solid var(--green);text-align:center;">
            <div style="font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:0.5rem;">&#10024; Alla stopp klara!</div>
            <div style="font-size:0.9rem;color:var(--gray-600);margin-bottom:0.75rem;">Uppskattad rutt: ~${estimatedKm} km</div>
            <div style="display:flex;gap:0.75rem;align-items:flex-end;max-width:300px;margin:0 auto;">
              <div style="flex:1;">
                <label style="font-size:0.8rem;color:var(--gray-500);display:block;margin-bottom:0.25rem;">Faktisk km</label>
                <input type="number" id="route-km" min="0" step="0.1" value="${loggedKm || estimatedKm}" style="width:100%;padding:0.5rem;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:1rem;font-family:inherit;text-align:center;">
              </div>
              <button onclick="saveRouteKm()" style="padding:0.5rem 1rem;background:var(--green);color:var(--white);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-weight:600;">Spara</button>
            </div>
            ${user?.pay_type === 'per_km' && user.pay_rate ? `<div style="font-size:0.85rem;color:var(--gray-500);margin-top:0.5rem;">= <strong style="color:var(--green);">${Math.round((loggedKm || estimatedKm) * user.pay_rate)} kr</strong> (${user.pay_rate} kr/km)</div>` : ''}
          </div>
        `);
      } else if (stops.length > 0) {
        // Visa progress
        section.insertAdjacentHTML('beforeend', `
          <div style="margin-top:0.75rem;text-align:center;font-size:0.85rem;color:var(--gray-400);">
            ${done}/${stops.length} stopp klara — ~${estimatedKm} km total rutt
          </div>
        `);
      }
    }

    function saveRouteKm() {
      const km = parseFloat(document.getElementById('route-km').value) || 0;
      let entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
      if (!entry) { entry = { user_id: CURRENT_USER.id, date: today(), clock_in: null, clock_out: null, knives_sharpened: 0, stops_completed: 0, notes: '', km_driven: 0 }; TIMELOG.push(entry); }
      entry.km_driven = km;
      saveTimelog();
      renderView('forare-route');
    }

    function markStop(index) {
      const todaySched = DATA.schedule.filter(s => s.date === today());
      let i = 0;
      for (const s of todaySched) {
        for (const stop of s.stops) {
          if (i === index) {
            stop.completed = true;
            // Animate the card
            const cards = document.querySelectorAll('.card.slide-in');
            if (cards[index]) {
              cards[index].style.borderLeftColor = 'var(--green)';
              cards[index].classList.add('success-pop');
            }
            saveSchedule();
            // Update stop count in timelog
            let entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
            if (!entry) { entry = { user_id: CURRENT_USER.id, date: today(), clock_in: null, clock_out: null, knives_sharpened: 0, stops_completed: 0, notes: '' }; TIMELOG.push(entry); }
            entry.stops_completed = (entry.stops_completed || 0) + 1;
            saveTimelog();
            setTimeout(() => renderView('forare-route'), 400);
            return;
          }
          i++;
        }
      }
    }

    // === CLOCK IN/OUT ===
    function clockIn() {
      const time = new Date().toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
      let entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
      if (!entry) { entry = { user_id: CURRENT_USER.id, date: today(), clock_in: null, clock_out: null, knives_sharpened: 0, stops_completed: 0, notes: '' }; TIMELOG.push(entry); }
      entry.clock_in = time;
      saveTimelog();
      // Animate
      const btn = document.querySelector('.clock-btn');
      if (btn) btn.classList.add('success-pop');
      const view = CURRENT_USER.role === 'slipare' ? 'slipare-home' : CURRENT_USER.role === 'forare' ? 'forare-home' : 'admin-log';
      setTimeout(() => renderView(view), 300);
    }

    function clockOut() {
      const time = new Date().toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
      const entry = TIMELOG.find(e => e.user_id === CURRENT_USER.id && e.date === today());
      if (!entry || !entry.clock_in) return;
      // Validera att utklockning är efter inklockning
      const [inH, inM] = entry.clock_in.split(':').map(Number);
      const [outH, outM] = time.split(':').map(Number);
      if ((outH * 60 + outM) <= (inH * 60 + inM)) return;
      entry.clock_out = time;
      saveTimelog();
      const btn = document.querySelector('.clock-btn');
      if (btn) btn.classList.add('success-pop');
      const view = CURRENT_USER.role === 'slipare' ? 'slipare-home' : CURRENT_USER.role === 'forare' ? 'forare-home' : 'admin-log';
      setTimeout(() => renderView(view), 300);
    }

    // === INIT ===
    // Desktop login
    document.getElementById('login-btn')?.addEventListener('click', () => login(document.getElementById('login-pin').value));
    document.getElementById('login-pin')?.addEventListener('keydown', e => { if (e.key === 'Enter') login(document.getElementById('login-pin').value); });

    // Mobile PIN pad
    (function() {
      let pinCode = '';
      const MAX_PIN = 6;
      const dots = document.querySelectorAll('#pin-dots .pin-dot');
      const pad = document.getElementById('pin-pad');
      if (!pad) return;

      function updateDots() {
        dots.forEach((dot, i) => {
          dot.classList.toggle('filled', i < pinCode.length);
          dot.classList.remove('error');
        });
      }

      function showError() {
        dots.forEach(d => { d.classList.add('error'); d.classList.remove('filled'); });
        setTimeout(() => {
          pinCode = '';
          updateDots();
        }, 500);
      }

      pad.querySelectorAll('.pin-key').forEach(key => {
        key.addEventListener('click', async function(e) {
          e.preventDefault();
          const digit = this.dataset.digit;

          if (digit === '') return; // empty spacer

          if (digit === 'del') {
            if (pinCode.length > 0) {
              pinCode = pinCode.slice(0, -1);
              updateDots();
            }
            return;
          }

          if (pinCode.length >= MAX_PIN) return;
          pinCode += digit;
          updateDots();

          // Auto-submit when 4+ digits entered
          if (pinCode.length >= 4) {
            // Small delay so user sees last dot fill
            await new Promise(r => setTimeout(r, 200));
            const ok = await login(pinCode);
            if (!ok) {
              showError();
              document.getElementById('login-error').textContent = 'Fel PIN-kod';
            }
          }
        });
      });

      // Reset PIN pad on logout
      const origLogout = window.logout;
      window.logout = function() {
        pinCode = '';
        updateDots();
        origLogout();
      };
    })();

    // Auto-login from URL hash, sessionStorage, or triple-click PIN
    (async function() {
      await loadUsers();
      // Check URL hash first (from triple-click on main site)
      const hashPin = window.location.hash.match(/pin=(\d+)/);
      if (hashPin) {
        history.replaceState(null, '', window.location.pathname); // rensa PIN från URL
        const ok = await login(hashPin[1]);
        if (ok) return;
      }
      // Fallback to sessionStorage
      const savedPin = sessionStorage.getItem('knivslip_pin');
      if (savedPin) {
        const ok = await login(savedPin);
        if (!ok) sessionStorage.removeItem('knivslip_pin');
      }
    })();
  </script>
</body>
</html>
