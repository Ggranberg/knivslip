<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knivslip Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0a0a0a; --dark: #1a1a1a; --gray-900: #262626; --gray-800: #333;
      --gray-700: #404040; --gray-600: #555; --gray-500: #737373; --gray-400: #999;
      --gray-300: #d4d4d4; --gray-200: #e5e5e5; --gray-100: #f5f5f5; --white: #fafafa;
      --accent: #e85d04; --accent-hover: #d45003; --accent-light: #fef3e6;
      --green: #16a34a; --green-light: #dcfce7; --yellow: #ca8a04; --yellow-light: #fef9c3;
      --red: #dc2626; --red-light: #fee2e2; --blue: #2563eb; --blue-light: #dbeafe;
      --sidebar-w: 220px; --radius: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-100); color: var(--dark); min-height: 100vh; }

    /* LOGIN SCREEN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); }
    .login-box { background: var(--gray-900); padding: 2.5rem; border-radius: 16px; text-align: center; width: 340px; }
    .login-box .logo { color: var(--accent); font-size: 1.5rem; font-weight: 800; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
    .login-box .subtitle { color: var(--gray-500); font-size: 0.85rem; margin-bottom: 2rem; }
    /* Desktop: standard input */
    .login-box input { width: 100%; padding: 0.9rem; border: 2px solid var(--gray-700); border-radius: var(--radius); background: var(--gray-800); color: var(--white); font-size: 1.3rem; text-align: center; letter-spacing: 0.4em; font-family: inherit; margin-bottom: 1rem; }
    .login-box input:focus { outline: none; border-color: var(--accent); }
    .login-box .login-btn { width: 100%; padding: 0.8rem; background: var(--accent); color: var(--white); border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .login-box .login-btn:hover { background: var(--accent-hover); }
    .login-box .login-error { color: var(--red); font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* PIN PAD — custom numpad for touch */
    .pin-pad { display: none; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--gray-500);
      background: transparent;
      transition: all 0.2s ease;
    }
    .pin-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.15);
    }
    .pin-dot.error {
      border-color: var(--red);
      background: var(--red);
      animation: pinShake 0.4s ease;
    }
    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 280px;
      margin: 0 auto;
    }
    .pin-key {
      height: 64px;
      border: none;
      border-radius: 50%;
      width: 64px;
      margin: 0 auto;
      font-size: 1.6rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      background: var(--gray-800);
      color: var(--white);
    }
    .pin-key:active {
      background: var(--accent);
      transform: scale(0.92);
    }
    .pin-key.fn {
      background: transparent;
      color: var(--gray-400);
      font-size: 1rem;
    }
    .pin-key.fn:active {
      background: rgba(255,255,255,0.05);
      color: var(--white);
    }
    .pin-key.fn.delete-key {
      font-size: 1.4rem;
    }

    @media (max-width: 768px) {
      .login-box { width: calc(100% - 2rem); max-width: 340px; padding: 2rem 1.5rem; background: transparent; }
      .login-box .desktop-login { display: none; }
      .pin-pad { display: block; }
    }
    @media (min-width: 769px) {
      .pin-pad { display: none !important; }
      .login-box .desktop-login { display: block; }
    }

    /* APP LAYOUT */
    .app { display: none; min-height: 100vh; }
    .app.visible { display: flex; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--black); color: var(--white); padding: 1.5rem 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 10; }
    .sidebar-logo { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.15em; padding: 0 1.25rem; margin-bottom: 0.5rem; color: var(--accent); }
    .sidebar-user { padding: 0 1.25rem; margin-bottom: 1.5rem; }
    .sidebar-user .user-name { color: var(--white); font-size: 0.9rem; font-weight: 600; }
    .sidebar-user .user-role { color: var(--gray-500); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .sidebar-nav a { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 1.25rem; color: var(--gray-400); font-size: 0.9rem; text-decoration: none; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--gray-900); color: var(--white); border-left-color: var(--accent); }
    .sidebar-nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-footer { position: absolute; bottom: 1rem; left: 0; right: 0; padding: 0 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .sidebar-footer a, .sidebar-footer button { color: var(--gray-500); font-size: 0.8rem; text-decoration: none; background: none; border: none; cursor: pointer; font-family: inherit; text-align: left; padding: 0; }
    .sidebar-footer a:hover, .sidebar-footer button:hover { color: var(--accent); }

    /* MAIN */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 2rem; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .main-header h1 { font-size: 1.5rem; font-weight: 700; }
    .main-header .date { color: var(--gray-500); font-size: 0.9rem; }
    .refresh-btn { background: var(--accent); color: var(--white); border: none; padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; }
    .refresh-btn:hover { background: var(--accent-hover); }

    /* KPI CARDS */
    .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .kpi-card { background: var(--white); border-radius: var(--radius); padding: 1.25rem; border: 1px solid var(--gray-200); }
    .kpi-card .kpi-label { font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .kpi-card .kpi-value { font-size: 2rem; font-weight: 800; color: var(--dark); }
    .kpi-card .kpi-sub { font-size: 0.8rem; color: var(--gray-500); margin-top: 0.25rem; }
    .kpi-card.accent .kpi-value { color: var(--accent); }
    .kpi-card.green .kpi-value { color: var(--green); }
    .kpi-card.red .kpi-value { color: var(--red); }

    /* SECTIONS */
    .section { margin-bottom: 2rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.15rem; font-weight: 700; }
    .section-header .badge { background: var(--accent-light); color: var(--accent); padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); overflow: hidden; }

    /* PIPELINE */
    .pipeline { display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .pipeline-col { min-width: 180px; flex: 1; }
    .pipeline-col-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500); padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; }
    .pipeline-col-header .count { background: var(--gray-200); padding: 0.1rem 0.5rem; border-radius: 10px; font-weight: 600; color: var(--gray-700); }
    .pipeline-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 0.75rem; margin-bottom: 0.5rem; }
    .pipeline-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .pipeline-card .pc-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .pipeline-card .pc-meta { font-size: 0.75rem; color: var(--gray-500); }
    .pc-badge { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; }
    .pc-badge.warn { background: var(--yellow-light); color: var(--yellow); }
    .pc-badge.ok { background: var(--green-light); color: var(--green); }
    .pipeline-empty { color: var(--gray-400); font-size: 0.8rem; padding: 1rem 0.75rem; font-style: italic; }

    /* SCHEDULE */
    .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .schedule-day { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.25rem; }
    .schedule-day h3 { font-size: 1rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--gray-200); }
    .schedule-stop { display: flex; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid var(--gray-100); align-items: center; }
    .schedule-stop:last-child { border-bottom: none; }
    .stop-type { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 4px; text-transform: uppercase; }
    .stop-type.pickup { background: var(--blue-light); color: var(--blue); }
    .stop-type.delivery { background: var(--green-light); color: var(--green); }
    .stop-info { flex: 1; }
    .stop-info .stop-name { font-weight: 600; font-size: 0.9rem; }
    .stop-info .stop-address { font-size: 0.8rem; color: var(--gray-500); }
    .stop-time { font-size: 0.8rem; color: var(--gray-500); white-space: nowrap; }
    .stop-done-btn { background: var(--green); color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: 600; }
    .stop-done-btn.completed { background: var(--gray-300); color: var(--gray-600); cursor: default; }
    .schedule-empty { color: var(--gray-400); font-size: 0.85rem; padding: 1rem 0; font-style: italic; }

    /* TABLE */
    .table-controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .search-input { flex: 1; max-width: 300px; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9rem; font-family: inherit; }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .filter-select { padding: 0.5rem 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.85rem; font-family: inherit; background: var(--white); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.6rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500); border-bottom: 2px solid var(--gray-200); }
    td { padding: 0.6rem 0.75rem; font-size: 0.9rem; border-bottom: 1px solid var(--gray-100); }
    tr:hover td { background: var(--gray-100); }
    .source-tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
    .source-tag.dorr { background: var(--blue-light); color: var(--blue); }
    .source-tag.facebook { background: #e0e7ff; color: #4338ca; }
    .source-tag.referral { background: var(--green-light); color: var(--green); }
    .source-tag.hemsida { background: var(--accent-light); color: var(--accent); }
    .missing { color: var(--red); font-size: 0.8rem; font-style: italic; }

    /* REMINDERS */
    .reminder-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
    .reminder-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1rem; border-left: 3px solid var(--yellow); }
    .reminder-card .rc-name { font-weight: 600; font-size: 0.9rem; }
    .reminder-card .rc-date { font-size: 0.8rem; color: var(--gray-500); margin-top: 0.25rem; }
    .reminder-card .rc-phone { font-size: 0.85rem; color: var(--accent); margin-top: 0.25rem; font-weight: 500; }

    /* FINANCE */
    .finance-placeholder { text-align: center; padding: 3rem 2rem; color: var(--gray-400); }
    .finance-placeholder .fp-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* CLOCK IN/OUT — enhanced */
    .clock-section { background: var(--white); border: 1px solid var(--gray-200); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1.5rem; transition: all 0.3s; }
    .clock-section.clocked-in { border-color: var(--green); background: var(--green-light); }
    .clock-status { font-size: 1rem; flex: 1; }
    .clock-status .clock-time { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
    .clock-status .clock-label { font-size: 0.85rem; color: var(--gray-500); }
    .clock-btn { padding: 1rem 2.5rem; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.15s, box-shadow 0.15s; }
    .clock-btn:hover { transform: scale(1.05); }
    .clock-btn:active { transform: scale(0.97); }
    .clock-btn.in { background: var(--green); color: white; box-shadow: 0 4px 14px rgba(22,163,74,0.3); }
    .clock-btn.out { background: var(--red); color: white; box-shadow: 0 4px 14px rgba(220,38,38,0.3); }

    /* Success animation */
    @keyframes successPop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardDone {
      0% { transform:scale(1); opacity:1; background:var(--white); }
      30% { transform:scale(1.02); background:var(--green-light); border-color:var(--green); }
      100% { transform:scale(0.95) translateX(60px); opacity:0; }
    }
    .success-pop { animation: successPop 0.4s ease-out; }
    .slide-in { animation: slideIn 0.3s ease-out; }
    .card-done { animation: cardDone 0.5s ease-out forwards; pointer-events:none; }

    /* SLIPARE LOG */
    .log-form { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .log-form h3 { font-size: 1rem; margin-bottom: 1rem; }
    .log-row { display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .log-field { display: flex; flex-direction: column; gap: 0.25rem; }
    .log-field label { font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; }
    .log-field input, .log-field select { padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
    .log-field input:focus, .log-field select:focus { outline: none; border-color: var(--accent); }
    .log-submit { padding: 0.5rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; font-family: inherit; }
    .log-submit:hover { background: var(--accent-hover); }

    /* TEAM MANAGEMENT */
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .team-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.25rem; }
    .team-card .tc-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; }
    .team-card .tc-role { font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; margin-bottom: 0.75rem; }
    .team-card .tc-pin { font-size: 0.85rem; color: var(--gray-400); margin-bottom: 0.75rem; }
    .role-select { padding: 0.4rem 0.6rem; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 0.85rem; font-family: inherit; }
    .add-user-form { background: var(--white); border: 2px dashed var(--gray-300); border-radius: var(--radius); padding: 1.25rem; }
    .add-user-form h3 { font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--gray-500); }
    .add-user-form input, .add-user-form select { display: block; width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 0.9rem; font-family: inherit; margin-bottom: 0.5rem; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-box { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1.25rem; text-align: center; }
    .stat-box .sb-value { font-size: 2rem; font-weight: 800; }
    .stat-box .sb-label { font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; }

    /* MAP */
    .route-map { height: 400px; border-radius: var(--radius); border: 1px solid var(--gray-200); margin-bottom: 1rem; z-index: 1; }
    .map-controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .map-btn { padding: 0.5rem 1rem; border: none; border-radius: var(--radius); font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; }
    .map-btn.google { background: #4285f4; color: white; }
    .map-btn.google:hover { background: #3367d6; }
    .map-btn.toggle { background: var(--gray-200); color: var(--dark); }
    .map-btn.toggle.active { background: var(--accent); color: white; }
    .route-legend { display: flex; gap: 1.5rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--gray-500); }
    .route-legend span { display: flex; align-items: center; gap: 0.4rem; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

    /* CUSTOMER PROFILE MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal { background: var(--white); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .modal-header h2 { font-size: 1.2rem; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-500); padding: 0.25rem; }
    .modal-close:hover { color: var(--dark); }
    .modal-body { padding: 1.5rem; }
    .profile-field { margin-bottom: 1rem; }
    .profile-field label { display: block; font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .profile-field input, .profile-field select, .profile-field textarea { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.9rem; font-family: inherit; }
    .profile-field input:focus, .profile-field select:focus, .profile-field textarea:focus { outline: none; border-color: var(--accent); }
    .profile-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .profile-section { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--gray-200); }
    .profile-section h3 { font-size: 0.95rem; margin-bottom: 0.75rem; }
    .profile-order { padding: 0.6rem 0; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .modal-actions { display: flex; gap: 0.75rem; padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); }
    .modal-actions button { padding: 0.6rem 1.25rem; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save { background: var(--accent); color: white; border: none; }
    .btn-save:hover { background: var(--accent-hover); }
    .btn-cancel { background: none; border: 1px solid var(--gray-300); color: var(--gray-600); }
    .clickable-name { cursor: pointer; color: var(--dark); text-decoration: none; }
    .clickable-name:hover { color: var(--accent); text-decoration: underline; }

    /* OVERFLOW FIX */
    html, body { max-width: 100vw; overflow-x: hidden; }
    .main { min-width: 0; overflow-x: hidden; }
    .pipeline { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
    .card { overflow-x: auto; }
    table { min-width: 600px; }

    /* MOBILE BOTTOM NAV */
    .mobile-nav { display: none; }

    /* RESPONSIVE — DESKTOP */
    @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } .reminder-list { grid-template-columns: repeat(2, 1fr); } }

    /* RESPONSIVE — TABLET & MOBILE */
    @media (max-width: 768px) {
      /* Hide desktop sidebar */
      .sidebar { display: none; }

      /* Show mobile bottom navigation */
      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--black);
        border-top: 1px solid var(--gray-900);
        z-index: 100;
        padding: 0;
        padding-bottom: env(safe-area-inset-bottom, 0);
        justify-content: space-around;
        align-items: stretch;
      }

      .mobile-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 8px 4px 6px;
        color: var(--gray-500);
        text-decoration: none;
        font-size: 0.65rem;
        font-weight: 600;
        flex: 1;
        text-align: center;
        transition: color 0.15s;
        position: relative;
        -webkit-tap-highlight-color: transparent;
      }

      .mobile-nav a.active {
        color: var(--accent);
      }

      .mobile-nav a .nav-icon {
        font-size: 1.25rem;
        line-height: 1;
      }

      .mobile-nav .nav-badge {
        position: absolute;
        top: 4px;
        right: calc(50% - 18px);
        background: var(--red);
        color: white;
        font-size: 0.6rem;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 8px;
        min-width: 16px;
        text-align: center;
      }

      /* Main content — full width, padding for bottom nav */
      .main {
        margin-left: 0;
        padding: 1rem 0.75rem;
        padding-bottom: calc(70px + env(safe-area-inset-bottom, 0));
      }

      /* Header — compact */
      .main-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .main-header h1 { font-size: 1.2rem; }
      .main-header .date { font-size: 0.8rem; }
      .refresh-btn { padding: 0.4rem 0.75rem; font-size: 0.8rem; }

      /* KPI cards — 2-column, compact */
      .kpi-grid {
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .kpi-card {
        padding: 0.75rem;
        border-radius: 10px;
      }
      .kpi-card .kpi-label { font-size: 0.7rem; margin-bottom: 0.25rem; }
      .kpi-card .kpi-value { font-size: 1.4rem; }
      .kpi-card .kpi-sub { font-size: 0.7rem; }

      /* Schedule — single column */
      .schedule-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .schedule-day { padding: 0.75rem; }
      .schedule-day h3 { font-size: 0.9rem; }
      .schedule-stop { padding: 0.5rem 0; }

      /* Pipeline — horizontal scroll, snap */
      .pipeline { gap: 0.5rem; scroll-snap-type: x mandatory; }
      .pipeline-col { min-width: 200px; scroll-snap-align: start; flex: 0 0 70vw; }
      .pipeline-card { padding: 0.6rem; }

      /* Stats row */
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .stat-box { padding: 0.75rem; }
      .stat-box .sb-value { font-size: 1.4rem; }
      .stat-box .sb-label { font-size: 0.7rem; }

      /* Clock section — vertical, centered */
      .clock-section {
        flex-direction: column;
        text-align: center;
        padding: 1.25rem;
        border-radius: 12px;
      }
      .clock-status .clock-time { font-size: 2rem; }
      .clock-btn { width: 100%; padding: 0.85rem; font-size: 1rem; border-radius: 10px; }

      /* Log forms */
      .log-form { padding: 1rem; }
      .log-row { flex-direction: column; gap: 0.5rem; }
      .log-field input, .log-field select { font-size: 16px; } /* Prevent iOS zoom */
      .log-submit { width: 100%; padding: 0.7rem; min-height: 44px; }

      /* Tables — horizontal scroll with hint */
      .card { border-radius: 8px; }
      table { min-width: 500px; }
      th { padding: 0.5rem; font-size: 0.7rem; }
      td { padding: 0.5rem; font-size: 0.8rem; }

      /* Table controls */
      .table-controls { flex-direction: column; gap: 0.5rem; }
      .search-input { max-width: 100%; font-size: 16px; padding: 0.6rem; }
      .filter-select { font-size: 16px; padding: 0.6rem; }

      /* Team grid */
      .team-grid { grid-template-columns: 1fr; gap: 0.75rem; }
      .team-card { padding: 1rem; }

      /* Reminder cards */
      .reminder-list { grid-template-columns: 1fr; gap: 0.5rem; }

      /* Booking cards */
      .section { margin-bottom: 1rem; }

      /* Modal — full screen on mobile */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        max-width: 100%;
        max-height: 95vh;
        border-radius: 16px 16px 0 0;
        width: 100%;
      }
      .modal-header { padding: 1rem; }
      .modal-header h2 { font-size: 1.1rem; }
      .modal-body { padding: 1rem; }
      .profile-row { grid-template-columns: 1fr; gap: 0.75rem; }
      .profile-field input, .profile-field select, .profile-field textarea { font-size: 16px; }
      .modal-actions {
        flex-wrap: wrap;
        padding: 0.75rem;
        gap: 0.5rem;
        padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0));
      }
      .modal-actions button { flex: 1; min-width: 120px; min-height: 44px; font-size: 0.85rem; }

      /* Route map */
      .route-map { height: 280px; }
      .map-controls { flex-wrap: wrap; gap: 0.4rem; }
      .map-btn { padding: 0.4rem 0.6rem; font-size: 0.75rem; }
      .route-legend { flex-wrap: wrap; gap: 0.5rem; font-size: 0.75rem; }

      /* All buttons — minimum 44px touch target */
      button, .log-submit, .clock-btn, .stop-done-btn, .map-btn {
        min-height: 44px;
      }

      /* Prevent iOS font zoom */
      input, select, textarea { font-size: 16px !important; }

      /* Login box — full width on mobile */
      .login-box { width: calc(100% - 2rem); max-width: 340px; }
    }

    /* Extra small phones */
    @media (max-width: 380px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 0.4rem; }
      .kpi-card .kpi-value { font-size: 1.2rem; }
      .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem; }
      .stat-box .sb-value { font-size: 1.1rem; }
      .main { padding: 0.5rem; padding-bottom: calc(70px + env(safe-area-inset-bottom, 0)); }
      .mobile-nav a { font-size: 0.6rem; padding: 6px 2px 4px; }
      .mobile-nav a .nav-icon { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="logo">KNIVSLIP</div>
      <div class="subtitle">Personalportal</div>

      <!-- Desktop: standard input -->
      <div class="desktop-login">
        <input type="password" id="login-pin" maxlength="6" placeholder="PIN-kod" autofocus>
        <button class="login-btn" id="login-btn">Logga in</button>
      </div>

      <!-- Mobile: custom PIN pad -->
      <div class="pin-pad" id="pin-pad">
        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" data-i="0"></div>
          <div class="pin-dot" data-i="1"></div>
          <div class="pin-dot" data-i="2"></div>
          <div class="pin-dot" data-i="3"></div>
        </div>
        <div class="pin-grid">
          <button class="pin-key" data-digit="1">1</button>
          <button class="pin-key" data-digit="2">2</button>
          <button class="pin-key" data-digit="3">3</button>
          <button class="pin-key" data-digit="4">4</button>
          <button class="pin-key" data-digit="5">5</button>
          <button class="pin-key" data-digit="6">6</button>
          <button class="pin-key" data-digit="7">7</button>
          <button class="pin-key" data-digit="8">8</button>
          <button class="pin-key" data-digit="9">9</button>
          <button class="pin-key fn" data-digit=""></button>
          <button class="pin-key" data-digit="0">0</button>
          <button class="pin-key fn delete-key" data-digit="del">&#9003;</button>
        </div>
      </div>

      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebar-logo">KNIVSLIP</div>
      <div class="sidebar-user">
        <div class="user-name" id="sidebar-name"></div>
        <div class="user-role" id="sidebar-role"></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <a href="https://knivkillarna.se">&#8592; Till hemsidan</a>
        <button onclick="logout()">Logga ut</button>
      </div>
    </aside>
    <div class="main" id="main-content"></div>
    <!-- Mobile bottom navigation -->
    <nav class="mobile-nav" id="mobile-nav"></nav>
  </div>

  <script>
    let DATA = {}, USERS = [], TIMELOG = [], CURRENT_USER = null;

    async function fetchJSON(file) {
      const res = await fetch('../data/' + file + '?t=' + Date.now());
      return res.json();
    }

    // === AUTH ===
    async function loadUsers() {
      const d = await fetchJSON('users.json');
      USERS = d.users;
    }

    function authenticate(pin) {
      return USERS.find(u => u.pin === pin && u.active);
    }

    function logout() {
      sessionStorage.removeItem('knivslip_pin');
      CURRENT_USER = null;
      document.getElementById('app').classList.remove('visible');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('login-pin').value = '';
      document.getElementById('login-error').textContent = '';
    }

    async function login(pin) {
      await loadUsers();
      const user = authenticate(pin);
      if (!user) {
        document.getElementById('login-error').textContent = 'Fel PIN-kod';
        return false;
      }
      CURRENT_USER = user;
      sessionStorage.setItem('knivslip_pin', pin);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      document.getElementById('sidebar-name').textContent = user.name;
      document.getElementById('sidebar-role').textContent = user.role === 'admin' ? 'Administratör' : user.role === 'slipare' ? 'Slipare' : 'Förare';
      await loadAllData();
      buildUI();
      return true;
    }

    // === DATA ===
    async function loadAllData() {
      const [customers, orders, knives, invoices, transactions, schedule, pricing, areas, timelog] = await Promise.all([
        fetchJSON('customers.json'), fetchJSON('orders.json'), fetchJSON('knives.json'),
        fetchJSON('invoices.json'), fetchJSON('transactions.json'), fetchJSON('schedule.json'),
        fetchJSON('pricing.json'), fetchJSON('areas.json'), fetchJSON('timelog.json')
      ]);
      DATA = { customers: customers.customers, orders: orders.orders, knives: knives.knives,
        invoices: invoices.invoices, transactions: transactions.transactions, schedule: schedule.schedule,
        pricing: pricing.pricing, areas: areas };
      TIMELOG = timelog.entries;
      await loadPendingBookings();
      // Update booking badges (sidebar + mobile nav)
      const badge = document.getElementById('booking-badge');
      if (badge) {
        if (PENDING_BOOKINGS.length > 0) {
          badge.textContent = PENDING_BOOKINGS.length;
          badge.style.display = 'inline';
        } else {
          badge.style.display = 'none';
        }
      }
      // Mobile nav badge
      const mobileBadge = document.querySelector('#mobile-nav .nav-badge');
      if (mobileBadge) {
        if (PENDING_BOOKINGS.length > 0) {
          mobileBadge.textContent = PENDING_BOOKINGS.length;
          mobileBadge.style.display = 'block';
        } else {
          mobileBadge.style.display = 'none';
        }
      }
    }

    // === BOKNINGAR (from bookings.json) ===
    let PENDING_BOOKINGS = [];

    async function loadPendingBookings() {
      try {
        const d = await fetchJSON('bookings.json');
        PENDING_BOOKINGS = (d.bookings || []).filter(b => b.status === 'pending');
      } catch(e) { console.error('Kunde inte ladda bokningar', e); PENDING_BOOKINGS = []; }
    }

    async function approveBooking(bookingId) {
      const btn = event?.target;
      if (btn) { btn.textContent = 'Godkänner...'; btn.disabled = true; }
      try {
        const res = await fetch('/api/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ booking_id: bookingId })
        });
        const data = await res.json();
        if (data.ok) {
          await loadPendingBookings();
          await loadAllData();
          renderView('bookings');
        }
      } catch(e) { alert('Kunde inte godkanna'); }
    }

    async function deleteBooking(bookingId) {
      const b = PENDING_BOOKINGS.find(x => x.id === bookingId);
      if (!b) return;
      if (!confirm(`Ta bort bokning fran ${b.name}?`)) return;

      // Load, remove, save
      const d = await fetchJSON('bookings.json');
      d.bookings = (d.bookings || []).filter(x => x.id !== bookingId);
      await saveJSON('bookings.json', d);
      await loadPendingBookings();
      renderView('bookings');
    }

    function editBooking(bookingId) {
      const b = PENDING_BOOKINGS.find(x => x.id === bookingId);
      if (!b) return;
      const card = document.querySelector(`[data-booking-id="${bookingId}"]`);
      if (!card) return;
      const inputStyle = 'width:100%;padding:0.4rem 0.6rem;border:1px solid var(--gray-600);border-radius:var(--radius);background:var(--gray-800);color:var(--white);font-family:inherit;font-size:0.9rem;';
      card.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:0.5rem;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
            <div><label style="font-size:0.75rem;color:var(--gray-400);">Namn</label><input id="edit-name" value="${b.name||''}" style="${inputStyle}"></div>
            <div><label style="font-size:0.75rem;color:var(--gray-400);">Telefon</label><input id="edit-phone" value="${b.phone||''}" style="${inputStyle}"></div>
          </div>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:0.5rem;">
            <div><label style="font-size:0.75rem;color:var(--gray-400);">Adress</label><input id="edit-address" value="${b.address||''}" style="${inputStyle}"></div>
            <div><label style="font-size:0.75rem;color:var(--gray-400);">Postnummer</label><input id="edit-zip" value="${b.postnummer||''}" style="${inputStyle}"></div>
            <div><label style="font-size:0.75rem;color:var(--gray-400);">Knivar</label>
              <select id="edit-knives" style="${inputStyle}">
                <option value="1-2" ${b.knives==='1-2'?'selected':''}>1-2 knivar</option>
                <option value="3-5" ${b.knives==='3-5'?'selected':''}>3-5 knivar</option>
                <option value="6+" ${b.knives==='6+'?'selected':''}>6+ knivar</option>
              </select>
            </div>
          </div>
          <div><label style="font-size:0.75rem;color:var(--gray-400);">Meddelande</label><input id="edit-msg" value="${b.message||''}" style="${inputStyle}"></div>
          <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.25rem;">
            <button onclick="saveBookingEdit('${bookingId}')" class="log-submit" style="padding:0.4rem 1rem;font-size:0.85rem;">Spara</button>
            <button onclick="renderView('bookings')" style="padding:0.4rem 1rem;font-size:0.85rem;background:var(--gray-600);color:var(--white);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;">Avbryt</button>
          </div>
        </div>
      `;
    }

    async function saveBookingEdit(bookingId) {
      const d = await fetchJSON('bookings.json');
      const b = (d.bookings || []).find(x => x.id === bookingId);
      if (!b) return;
      b.name = document.getElementById('edit-name').value.trim() || b.name;
      b.phone = document.getElementById('edit-phone').value.trim() || b.phone;
      b.address = document.getElementById('edit-address').value.trim() || b.address;
      b.postnummer = document.getElementById('edit-zip').value.trim() || b.postnummer;
      b.knives = document.getElementById('edit-knives').value || b.knives;
      b.message = document.getElementById('edit-msg').value.trim();
      await saveJSON('bookings.json', d);
      await loadPendingBookings();
      renderView('bookings');
    }

    function renderBookings(main) {
      const count = PENDING_BOOKINGS.length;
      main.insertAdjacentHTML('beforeend', `
        <div class="section">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <div>
              <span style="font-size:2rem;font-weight:800;color:${count > 0 ? 'var(--accent)' : 'var(--gray-400)'};">${count}</span>
              <span style="font-size:1rem;color:var(--gray-500);margin-left:0.5rem;">nya bokningar väntar</span>
            </div>
            <button onclick="showManualBookingForm()" class="log-submit" style="padding:0.6rem 1.2rem;font-size:0.9rem;">+ Ny bokning (telefon)</button>
          </div>
          <div id="manual-booking-form"></div>
          <div id="booking-list"></div>
        </div>
      `);

      const list = document.getElementById('booking-list');
      if (!count) {
        list.innerHTML = '<div style="color:var(--gray-400);font-style:italic;padding:2rem;text-align:center;">Inga nya bokningar. Nar en kund bokar pa knivkillarna.se dyker den upp har.</div>';
        return;
      }

      const knifeLabel = {'1-2': '1–2 knivar (170 kr/st)', '3-5': '3–5 knivar (140 kr/st)', '6+': '6+ knivar (120 kr/st)'};

      list.innerHTML = PENDING_BOOKINGS.map(b => `
        <div class="card" data-booking-id="${b.id}" style="padding:1rem;margin-bottom:0.75rem;border-left:4px solid var(--accent);">
          <div style="font-weight:700;font-size:1.1rem;margin-bottom:0.4rem;">${b.name}</div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;font-size:0.85rem;">
            <span>&#128222; ${b.phone || '<span style="color:var(--red);">Saknas</span>'}</span>
            <span>&#127968; ${b.address}${b.postnummer ? ', ' + b.postnummer : ''} ${b.stad || ''}</span>
            <span>&#128298; ${knifeLabel[b.knives] || b.knives || '?'}</span>
          </div>
          ${b.preferred_date ? `<div style="font-size:0.85rem;color:var(--gray-500);margin-top:0.25rem;">&#128339; Önskat datum: ${b.preferred_date} ${b.time_window || ''}</div>` : ''}
          ${b.message ? `<div style="font-size:0.85rem;color:var(--gray-500);margin-top:0.25rem;font-style:italic;">"${b.message}"</div>` : ''}
          <div style="font-size:0.75rem;color:var(--gray-400);margin-top:0.25rem;">Bokad: ${b.created_at ? new Date(b.created_at).toLocaleString('sv-SE') : '?'}</div>
          <div style="display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;">
            <button onclick="approveBooking('${b.id}')" class="log-submit" style="padding:0.5rem 1rem;flex:1;min-width:90px;">&#10003; Godkänn</button>
            <button onclick="editBooking('${b.id}')" style="padding:0.5rem 1rem;flex:1;min-width:70px;background:var(--gray-600);color:var(--white);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:0.85rem;">Ändra</button>
            <button onclick="deleteBooking('${b.id}')" style="padding:0.5rem 1rem;min-width:70px;background:var(--red);color:var(--white);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:0.85rem;">Ta bort</button>
          </div>
        </div>
      `).join('');
    }

    // === MANUAL BOOKING (PHONE) ===
    function showManualBookingForm() {
      const el = document.getElementById('manual-booking-form');
      if (el.innerHTML) { el.innerHTML = ''; return; }
      el.innerHTML = `
        <div class="card" style="padding:1.25rem;margin-bottom:1rem;border-left:4px solid var(--blue);">
          <div style="font-weight:700;margin-bottom:1rem;font-size:1.05rem;">Lagg till bokning manuellt</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Namn *</label><input id="mb-name" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;"></div>
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Telefon *</label><input id="mb-phone" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;"></div>
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Adress *</label><input id="mb-address" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;"></div>
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Antal knivar</label><select id="mb-knives" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;"><option value="1-2">1-2 (170 kr/st)</option><option value="3-5" selected>3-5 (140 kr/st)</option><option value="6+">6+ (120 kr/st)</option></select></div>
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Källa</label><select id="mb-source" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;"><option value="telefon" selected>Telefon</option><option value="facebook">Facebook</option><option value="dorr">Dörrknackning</option><option value="referral">Referral</option></select></div>
            <div><label style="font-size:0.8rem;color:var(--gray-500);">Anteckning</label><input id="mb-message" style="width:100%;padding:0.5rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:inherit;" placeholder="Valfritt"></div>
          </div>
          <div style="display:flex;gap:0.5rem;margin-top:1rem;">
            <button onclick="submitManualBooking()" class="log-submit" style="padding:0.5rem 1.5rem;">Skapa bokning</button>
            <button onclick="document.getElementById('manual-booking-form').innerHTML=''" style="padding:0.5rem 1rem;background:var(--gray-200);border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;">Avbryt</button>
          </div>
        </div>`;
    }

    async function submitManualBooking() {
      const name = document.getElementById('mb-name').value.trim();
      const phone = document.getElementById('mb-phone').value.trim();
      const address = document.getElementById('mb-address').value.trim();
      const knives = document.getElementById('mb-knives').value;
      const source = document.getElementById('mb-source').value;
      const message = document.getElementById('mb-message').value.trim();
      if (!name || !phone || !address) { alert('Namn, telefon och adress kravs'); return; }
      try {
        const res = await fetch('/api/booking', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, phone, address, knives, source, message }) });
        const r = await res.json();
        if (r.ok) {
          document.getElementById('manual-booking-form').innerHTML = '';
          await loadPendingBookings();
          renderView('bookings');
        } else { alert(r.error || 'Fel'); }
      } catch(e) { alert('Kunde inte skapa bokning: ' + e.message); }
    }

    // === NEW ORDER FOR EXISTING CUSTOMER ===
    function showNewOrderForm(customerId) {
      const c = DATA.customers.find(c => c.id === customerId);
      if (!c) return;
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal" style="max-width:450px;">

    async function submitNewOrder(customerId) {
      const knifeCount = parseInt(document.getElementById('no-knives').value) || 0;
      if (knifeCount < 1) { alert('Ange antal knivar'); return; }
      const pricePerKnife = parseInt(document.getElementById('no-price').value) || null;
      const knives = knifeCount >= 6 ? '6+' : knifeCount >= 3 ? '3-5' : '1-2';
      const preferred_date = document.getElementById('no-date').value;
      const notes = document.getElementById('no-notes').value.trim();
      try {
        const res = await fetch('/api/create-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ customer_id: customerId, knives, actual_knife_count: knifeCount, price_per_knife: pricePerKnife, preferred_date, notes }) });
        const r = await res.json();
        if (r.ok) {
          document.querySelectorAll('.modal-overlay').forEach(o => o.remove());
          await loadAllData();
          // Open the new order directly so user can manage it
          const newOrder = DATA.orders.filter(o => o.customer_id === customerId).sort((a,b) => b.created_at.localeCompare(a.created_at))[0];
          if (newOrder) openOrder(newOrder.id);
          else openCustomer(customerId);
        } else { alert(r.error || 'Fel'); }
      } catch(e) { alert('Kunde inte skapa order: ' + e.message); }
    }

        if (!ppk && n > 0) ppk = defaultPriceForCount(n);
        totalInput.value = n && ppk ? n * ppk : '';
      }
      knivesInput.addEventListener('input', () => {
        // Update price placeholder when knife count changes
        const n = parseInt(knivesInput.value) || 0;
        priceInput.placeholder = defaultPriceForCount(n) || 'Auto';
        recalcTotal();
      });

      recalcTotal();

    async function saveOrderEdit(orderId) {
      const o = DATA.orders.find(x => x.id === orderId);
      if (!o) return;

      const newStatus = document.getElementById('oe-status').value;
      const newKnives = parseInt(document.getElementById('oe-knives').value) || null;
      const newPrice = parseInt(document.getElementById('oe-price').value) || null;
      const newNotes = document.getElementById('oe-notes').value.trim();
      const newPickupDate = document.getElementById('oe-pickup-date').value;
      const newDeliveryDate = document.getElementById('oe-delivery-date').value;
      const newPickupTime = document.getElementById('oe-pickup-time').value;
      const newDriver = document.getElementById('oe-driver').value;

      // Update status + add to history if changed
      if (newStatus !== o.status) {
        o.status = newStatus;
        if (!o.status_history) o.status_history = [];
        o.status_history.push({
          status: newStatus,
          timestamp: now(),
          by: CURRENT_USER.name.split(' ')[0].toLowerCase()
        });
      }

      // Update knife count
      if (newKnives) {
        o.actual_knife_count = newKnives;
      }

      // Update price
      if (newPrice) {
        o.price_per_knife = newPrice;
        o.custom_total_price = newKnives ? newKnives * newPrice : null;
      }

      // Update pickup/delivery
      if (!o.pickup) o.pickup = {};
      if (!o.delivery) o.delivery = {};
      o.pickup.date = newPickupDate || o.pickup.date;
      o.pickup.time_window = newPickupTime || null;
      o.pickup.assigned_to = newDriver || o.pickup.assigned_to;
      o.delivery.date = newDeliveryDate || o.delivery.date;

      o.notes = newNotes;
      o.updated_at = now();

      // Auto-logga intäkt vid completed
      if (newStatus === 'completed' && o.status === 'completed') {
        const totalPrice = o.custom_total_price || ((o.actual_knife_count || o.estimated_knife_count || 0) * (o.price_per_knife || 140));
        if (totalPrice > 0) {
          const cust = DATA.customers.find(c => c.id === o.customer_id);
          const txnId = 'TXN-' + today().replace(/-/g,'') + '-' + (DATA.transactions.length + 1).toString().padStart(3,'0');
          DATA.transactions.push({
            id: txnId,
            type: 'income',
            order_id: o.id,
            customer_name: cust?.name || 'Okänd',
            description: `Knivslipning ${o.actual_knife_count || o.estimated_knife_count || '?'} knivar`,
            amount_incl_vat: totalPrice,
            amount_excl_vat: Math.round(totalPrice / 1.25),
            vat: Math.round(totalPrice - totalPrice / 1.25),
            date: today(),
            created_by: CURRENT_USER.name.split(' ')[0],
            created_at: now()
          });
          await saveJSON('transactions.json', { transactions: DATA.transactions });
        }
      }

      await saveJSON('orders.json', { orders: DATA.orders });
      document.querySelector('.modal-overlay')?.remove();

      // Re-render current view
      const activeNav = document.querySelector('.sidebar-nav a.active');
      if (activeNav) renderView(activeNav.dataset.view);
    }

    function addCustomerComment(customerId) {
      const input = document.getElementById('cp-new-comment');
      const text = input.value.trim();
      if (!text) return;
      const c = DATA.customers.find(c => c.id === customerId);
      if (!c) return;
      if (!c.comments) c.comments = [];
      c.comments.push({ text, created_at: now(), created_by: CURRENT_USER.name });
      c.updated_at = now();
      input.value = '';
      renderCommentsList(customerId);
      saveJSON('customers.json', { customers: DATA.customers });
    }

    function deleteCustomerComment(customerId, idx) {
      const c = DATA.customers.find(c => c.id === customerId);
      if (!c || !c.comments) return;
      c.comments.splice(idx, 1);
      c.updated_at = now();
      renderCommentsList(customerId);
      saveJSON('customers.json', { customers: DATA.customers });

      const c = DATA.customers.find(c => c.id === customerId);

    function exportCustomerData(id) {
      const c = DATA.customers.find(c => c.id === id);
      if (!c) return;
      const orders = DATA.orders.filter(o => o.customer_id === id);
      const knives = DATA.knives.filter(k => k.customer_id === id);
      const invoices = DATA.invoices.filter(i => i.customer_id === id);

      const report = {
        registerutdrag: {
          genererat: now(),
          kund_id: c.id,
          begard_av: CURRENT_USER.name
        },
        personuppgifter: {
          namn: c.name,
          telefon: c.phone,
          email: c.email,
          adress: c.address,
          postnummer: c.postnummer,
          stad: c.stad,
          kalla: c.source,
          kund_sedan: c.created_at,
          anteckningar: c.notes
        },
        samtycke: c.gdpr_consent,
        ordrar: orders.map(o => ({
          id: o.id, status: o.status, knivar: o.estimated_knife_count,
          skapad: o.created_at, kalla: o.source
        })),
        knivar: knives.map(k => ({
          id: k.id, typ: k.type, marke: k.brand, skick_fore: k.condition_before, skick_efter: k.condition_after
        })),
        fakturor: invoices.map(i => ({
          id: i.id, nummer: i.invoice_number, belopp: i.total_incl_vat, status: i.status, datum: i.invoice_date
        }))
      };

      const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `registerutdrag-${c.name.replace(/\s+/g, '-').toLowerCase()}-${today()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function deleteCustomer(id) {
      const c = DATA.customers.find(c => c.id === id);
      if (!c) return;
      if (!confirm(`Vill du verkligen ta bort ${c.name}? Kunden anonymiseras (GDPR) men ordrar och fakturor behålls för bokföringen.`)) return;

      // GDPR-compliant: anonymize, don't delete
      c.name = 'Raderad kund';
      c.phone = null;
      c.email = null;
      c.address = null;
      c.postnummer = null;
      c.notes = null;
      c.is_deleted = true;
      c.updated_at = now();

      // Cancel active orders for this customer
      DATA.orders.forEach(o => {
        if (o.customer_id === id && !['completed','cancelled'].includes(o.status)) {
          o.status = 'cancelled';
          o.status_history.push({ status: 'cancelled', timestamp: now(), by: CURRENT_USER.name.toLowerCase().split(' ')[0] });
          o.notes = (o.notes || '') + ' Avbokad: kund raderad.';
        }
      });

      // Remove from schedule
      DATA.schedule.forEach(s => {
        s.stops = s.stops.filter(stop => stop.customer_id !== id);
      });
      DATA.schedule = DATA.schedule.filter(s => s.stops.length > 0);

      await saveJSON('customers.json', { customers: DATA.customers });
      await saveJSON('orders.json', { orders: DATA.orders });
      await saveJSON('schedule.json', { schedule: DATA.schedule });

      document.querySelector('.modal-overlay')?.remove();
      const activeNav = document.querySelector('.sidebar-nav a.active');
      if (activeNav) renderView(activeNav.dataset.view);
    }

    // === SAVE TO SERVER ===
    async function saveJSON(filename, data) {
      try {
        const res = await fetch('/api/save/' + filename, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (!result.ok) {
          console.error('Spara misslyckades: ' + filename, result);
          showToast('Kunde inte spara — försök igen', 'error');
        }
        return result.ok;
      } catch(e) {
        console.error('Nätverksfel vid spara ' + filename, e);
        showToast('Nätverksfel — kontrollera anslutningen', 'error');
        return false;
      }
    }

    function showToast(msg, type) {
      let toast = document.getElementById('toast-msg');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast-msg';
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:0.75rem 1.5rem;border-radius:8px;font-size:0.9rem;font-weight:600;z-index:9999;transition:opacity 0.3s;font-family:inherit;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.background = type === 'error' ? 'var(--red)' : 'var(--green)';
      toast.style.color = 'var(--white)';
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    function renderPipelineContent(parent) {
      const statuses = ['lead','booked','picked_up','registered','sharpening','quality_check','ready','out_for_delivery','delivered'];
      const labels = { lead:'Leads', booked:'Bokade', picked_up:'Hämtade', registered:'Registrerade', sharpening:'Slipning', quality_check:'QC', ready:'Redo', out_for_delivery:'På väg', delivered:'Levererade' };
      const container = document.createElement('div'); container.className = 'pipeline';
      container.innerHTML = statuses.map(status => {
        const orders = DATA.orders.filter(o => o.status === status);
        const cards = orders.map(o => {
          const last = o.status_history?.[o.status_history.length-1]?.timestamp;
          const days = last ? daysBetween(last, now()) : 0;
          return `<div class="pipeline-card" style="cursor:pointer;" onclick="openOrder('${o.id}')"><div class="pc-name">${getCustomerName(o.customer_id)}</div><div class="pc-meta">${o.actual_knife_count || o.estimated_knife_count||'?'} knivar <span class="pc-badge ${days>1?'warn':'ok'}">${days}d</span></div></div>`;
        }).join('');
        return `<div class="pipeline-col"><div class="pipeline-col-header">${labels[status]} <span class="count">${orders.length}</span></div>${cards||'<div class="pipeline-empty">Inga</div>'}</div>`;
      }).join('');
      parent.appendChild(container);
    }

    async function scheduleReassign(date, fromDriver, orderId, toDriver) {
      if (fromDriver === toDriver) return;
      // Hitta källrutten
      const fromSched = DATA.schedule.find(s => s.date === date && s.assigned_to === fromDriver);
      if (!fromSched) return;
      const stopIdx = fromSched.stops.findIndex(s => s.order_id === orderId);
      if (stopIdx === -1) return;

      // Flytta stoppet
      const stop = fromSched.stops.splice(stopIdx, 1)[0];

      // Hitta eller skapa målrutt
      let toSched = DATA.schedule.find(s => s.date === date && s.assigned_to === toDriver);
      if (!toSched) {
        toSched = { date, assigned_to: toDriver, stops: [], estimated_total_time_min: 0, estimated_start: '', estimated_end: '', notes: '' };
        DATA.schedule.push(toSched);
      }
      toSched.stops.push(stop);

      // Ta bort tomma rutter
      DATA.schedule = DATA.schedule.filter(s => s.stops.length > 0);

      await saveJSON('schedule.json', { schedule: DATA.schedule });
      renderView('schedule');
    }

    async function editTxn(idx, field, value) {
      const t = DATA.transactions[idx];
      if (!t) return;
      t[field] = value;
      await saveJSON('transactions.json', { transactions: DATA.transactions });
      // Uppdatera skuld-beräkning utan full re-render
      renderView('finance');
    }

    async function deleteTxn(idx) {
      const t = DATA.transactions[idx];
      if (!t) return;
      if (!confirm(`Ta bort "${t.description}" (${t.amount_incl_vat} kr)?`)) return;
      DATA.transactions.splice(idx, 1);
      await saveJSON('transactions.json', { transactions: DATA.transactions });
      renderView('finance');
    }

    async function addExpense() {
      let desc = document.getElementById('exp-desc').value;
      if (desc === 'Övrigt') desc = document.getElementById('exp-custom-text').value.trim() || 'Övrigt';
      const amount = parseInt(document.getElementById('exp-amount').value) || 0;
      const date = document.getElementById('exp-date').value || today();
      const paidBy = document.getElementById('exp-paid-by').value || 'företaget';
      if (!amount) return;

      const txnId = 'TXN-' + date.replace(/-/g,'') + '-' + (DATA.transactions.length + 1).toString().padStart(3,'0');
      DATA.transactions.push({
        id: txnId, type: 'expense', description: desc,
        amount_incl_vat: amount,
        paid_by: paidBy,
        date: date, created_by: CURRENT_USER.name.split(' ')[0], created_at: now()
      });
      await saveJSON('transactions.json', { transactions: DATA.transactions });
      renderView('finance');
    }

    async function logMissingIncome() {
      const loggedOrderIds = new Set(DATA.transactions.filter(t => t.type === 'income').map(t => t.order_id));
      const unlogged = DATA.orders.filter(o => o.status === 'completed' && !loggedOrderIds.has(o.id));

      for (const o of unlogged) {
        const knives = o.actual_knife_count || o.estimated_knife_count || 0;
        const pricePerKnife = o.price_per_knife || (knives <= 2 ? 170 : knives <= 5 ? 140 : 120);
        const totalPrice = o.custom_total_price || (knives * pricePerKnife);
        if (totalPrice <= 0) continue;

        const cust = DATA.customers.find(c => c.id === o.customer_id);
        const txnId = 'TXN-' + (o.updated_at || o.created_at || now()).split('T')[0].replace(/-/g,'') + '-' + (DATA.transactions.length + 1).toString().padStart(3,'0');
        DATA.transactions.push({
          id: txnId, type: 'income', order_id: o.id,
          customer_name: cust?.name || 'Okänd',
          description: `Knivslipning ${knives} knivar`,
          amount_incl_vat: totalPrice, amount_excl_vat: Math.round(totalPrice / 1.25),
          vat: Math.round(totalPrice - totalPrice / 1.25),
          date: (o.updated_at || o.created_at || now()).split('T')[0],
          created_by: 'auto', created_at: now()
        });
      }
      await saveJSON('transactions.json', { transactions: DATA.transactions });
      renderView('finance');
    }

      'AREA-NACKA-ALTA': [59.2960, 18.1780],
      'AREA-VARMDO-C': [59.3260, 18.3670],
      'AREA-VARMDO-HALSO': [59.3800, 18.5200],
      'AREA-VARMDO-INGARSO': [59.3440, 18.4400],
    };

    // Kända adresser med exakta koordinater
    const ADDRESS_COORDS = {
      'klostervagen 6': HOME_COORDS,
      'klostervägen 6': HOME_COORDS,
      'ligustervagen 65': [59.2940, 18.1820],
      'ligustervägen 65': [59.2940, 18.1820],
    };

    function coordsForAddress(addr, areaId) {
      const clean = addr.toLowerCase().replace(/[éè]/g,'e').replace(/,.*$/,'').trim();
      const cleanNorm = clean.replace(/[åä]/g,'a').replace(/ö/g,'o');

      // Exakt match
      for (const [key, val] of Object.entries(ADDRESS_COORDS)) {
        if (cleanNorm.includes(key.replace(/[åä]/g,'a').replace(/ö/g,'o')) || clean.includes(key)) return val;
      }

      // Fallback: områdescentrum med liten offset (så markörer inte överlappar)
      if (areaId && AREA_COORDS[areaId]) {
        const base = AREA_COORDS[areaId];
        let hash = 0;
        for (let i = 0; i < addr.length; i++) hash = ((hash << 5) - hash) + addr.charCodeAt(i);
        return [base[0] + (hash % 20 - 10) * 0.001, base[1] + (hash % 30 - 15) * 0.001];
      }

      // Sista fallback: Nacka centrum med offset
      let hash = 0;
      for (let i = 0; i < addr.length; i++) hash = ((hash << 5) - hash) + addr.charCodeAt(i);
      return [59.310 + (hash % 20 - 10) * 0.002, 18.163 + (hash % 20 - 10) * 0.003];
    }

    function buildGoogleMapsURL(stops, homeBase) {
      const base = homeBase || 'Klostervagen+6,+Nacka';
      const waypoints = stops.map(s => encodeURIComponent(s.address.replace(/\s+/g, '+'))).join('/');
      return `https://www.google.com/maps/dir/${encodeURIComponent(base)}/${waypoints}/${encodeURIComponent(base)}`;
    }

    function renderRouteMap(main) {
      const todayDate = today();
      const tomorrowDate = tomorrow();
      const allDates = [...new Set(DATA.schedule.map(s => s.date))].sort();
      const selectedDate = allDates.includes(tomorrowDate) ? tomorrowDate : (allDates[0] || todayDate);

      // Date selector
      main.insertAdjacentHTML('beforeend', `
        <div class="map-controls">
          ${allDates.map(d => `<button class="map-btn toggle ${d===selectedDate?'active':''}" onclick="renderRouteMapForDate('${d}')">${d === todayDate ? 'Idag' : d === tomorrowDate ? 'Imorgon' : d}</button>`).join('')}
        </div>
        <div id="route-map-container"></div>
      `);

      renderRouteMapForDate(selectedDate);
    }

    let routeMap = null;
    let routeFilter = 'all'; // 'all', 'pickup', 'delivery'
    let routeDriverFilter = 'all'; // 'all' or driver name
    let routeDate = '';

    // Nearest-neighbor route optimization
    function optimizeRoute(stops, home) {
      if (stops.length <= 1) return stops;
      const remaining = [...stops];
      const optimized = [];
      let current = home;
      while (remaining.length) {
        let nearest = 0, minDist = Infinity;
        remaining.forEach((s, i) => {
          const c = coordsForAddress(s.address, s.area_id);
          const d = Math.sqrt(Math.pow(c[0]-current[0],2) + Math.pow(c[1]-current[1],2));
          if (d < minDist) { minDist = d; nearest = i; }
        });
        const stop = remaining.splice(nearest, 1)[0];
        optimized.push(stop);
        current = coordsForAddress(stop.address, stop.area_id);
      }
      return optimized;
    }

    function renderRouteMapForDate(date) {
      routeDate = date;
      const container = document.getElementById('route-map-container');
      let schedules = DATA.schedule.filter(s => s.date === date);

      if (!schedules.length) {
        container.innerHTML = '<div style="color:var(--gray-400);font-style:italic;padding:2rem;">Inga rutter planerade for ' + date + '</div>';
        return;
      }

      const colors = { gustav: '#e85d04', philip: '#2563eb', adam: '#16a34a' };
      const homeCoords = HOME_COORDS;
      const drivers = [...new Set(schedules.map(s => s.assigned_to))];

      // Filter by driver
      if (routeDriverFilter !== 'all') {
        schedules = schedules.filter(s => s.assigned_to === routeDriverFilter);
      }

      // Optimize each driver's route
      schedules.forEach(s => {
        s.stops = optimizeRoute(s.stops, homeCoords);
        s.stops.forEach((st, i) => st.sequence = i + 1);
      });

      // Filter stops
      const filterStops = (stops) => {
        if (routeFilter === 'pickup') return stops.filter(s => s.type === 'pickup');
        if (routeFilter === 'delivery') return stops.filter(s => s.type === 'delivery');
        return stops;
      };

      // Google Maps links
      let gmapsHTML = schedules.map(s => {
        const filtered = filterStops(s.stops);
        if (!filtered.length) return '';
        const url = buildGoogleMapsURL(filtered, 'Klostervagen 6, Nacka');
        return `<a href="${url}" target="_blank" class="map-btn google">&#128205; ${s.assigned_to} i Google Maps</a>`;
      }).join('');

      // Filter buttons — type
      const filterHTML = `
        <button class="map-btn toggle ${routeFilter==='all'?'active':''}" onclick="routeFilter='all';renderRouteMapForDate('${date}')">Alla</button>
        <button class="map-btn toggle ${routeFilter==='pickup'?'active':''}" onclick="routeFilter='pickup';renderRouteMapForDate('${date}')" style="border-left:3px solid var(--blue);">Hämtningar</button>
        <button class="map-btn toggle ${routeFilter==='delivery'?'active':''}" onclick="routeFilter='delivery';renderRouteMapForDate('${date}')" style="border-left:3px solid var(--green);">Leveranser</button>
        <span style="color:var(--gray-300);margin:0 0.25rem;">|</span>
        <button class="map-btn toggle ${routeDriverFilter==='all'?'active':''}" onclick="routeDriverFilter='all';renderRouteMapForDate('${date}')">Alla förare</button>
        ${drivers.map(d => `<button class="map-btn toggle ${routeDriverFilter===d?'active':''}" onclick="routeDriverFilter='${d}';renderRouteMapForDate('${date}')" style="border-left:3px solid ${colors[d]||'#999'};">${d}</button>`).join('')}
      `;

      // Stop list with customer details + reassign
      let stopsHTML = '';
      schedules.forEach((s, si) => {
        const filtered = filterStops(s.stops);
        if (!filtered.length && routeFilter !== 'all') return;
        const color = colors[s.assigned_to] || '#737373';
        const totalKnives = filtered.reduce((sum, st) => {
          const order = DATA.orders.find(o => o.order_id === st.order_id || o.id === st.order_id);
          return sum + (order?.estimated_knife_count || 0);
        }, 0);

        stopsHTML += `<div style="margin-bottom:1.5rem;"><h3 style="font-size:1rem;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;"><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${color};"></span>${s.assigned_to} — ${filtered.length} stopp, ~${s.estimated_total_time_min} min</h3>`;

        filtered.forEach((stop, i) => {
          const cust = DATA.customers.find(c => c.id === stop.customer_id);
          const order = DATA.orders.find(o => o.id === stop.order_id);
          const phone = cust?.phone || null;
          const knives = order?.estimated_knife_count || '?';
          const otherDrivers = drivers.filter(d => d !== s.assigned_to);
          const reassignBtns = otherDrivers.map(d =>
            `<button onclick="reassignStop('${date}','${s.assigned_to}','${stop.order_id}','${d}')" style="padding:0.2rem 0.5rem;border:1px solid ${colors[d]||'#999'};border-radius:4px;background:none;cursor:pointer;font-size:0.7rem;color:${colors[d]||'#999'};">→ ${d}</button>`
          ).join(' ');

          stopsHTML += `
            <div class="card" style="padding:0.75rem 1rem;margin-bottom:0.5rem;">
              <div style="display:flex;gap:0.75rem;align-items:flex-start;">
                <span style="font-weight:800;color:${color};font-size:1.1rem;min-width:20px;">${i+1}</span>
                <span class="stop-type ${stop.type}">${stop.type==='pickup'?'Hamt':'Lev'}</span>
                <div style="flex:1;">
                  <div style="font-weight:600;"><a class="clickable-name" onclick="openCustomer('${stop.customer_id}')">${stop.customer_name}</a></div>
                  <div style="font-size:0.85rem;color:var(--gray-500);">${stop.address}</div>
                  <div style="display:flex;gap:1rem;margin-top:0.4rem;flex-wrap:wrap;font-size:0.8rem;">
                    ${phone ? `<a href="tel:${phone.replace(/\s/g,'')}" style="color:var(--accent);font-weight:600;text-decoration:none;">&#128222; ${phone}</a>` : '<span style="color:var(--red);font-style:italic;">Telefon saknas</span>'}
                    <span style="color:var(--gray-500);">&#128298; ${knives} knivar</span>
                    <span style="color:var(--gray-500);">&#128339; ${stop.time_window || 'Flexibel'}</span>
                  </div>
                  ${stop.notes ? `<div style="font-size:0.8rem;color:var(--gray-500);margin-top:0.25rem;font-style:italic;">${stop.notes}</div>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;gap:0.25rem;align-items:flex-end;">
                  ${reassignBtns}
                </div>
              </div>
            </div>`;
        });
        stopsHTML += '</div>';
      });

      container.innerHTML = `
        <div class="map-controls">${filterHTML}<div style="flex:1;"></div>${gmapsHTML}</div>
        <div class="route-legend">
          ${schedules.map(s => `<span><span class="legend-dot" style="background:${colors[s.assigned_to]||'#737373'};"></span>${s.assigned_to}</span>`).join('')}
          <span><span class="legend-dot" style="background:#000;"></span>Hem</span>
          <span style="margin-left:auto;font-size:0.8rem;color:var(--green);">&#10003; Rutt optimerad (nearest-neighbor)</span>
        </div>
        <div id="map-div" class="route-map"></div>
        ${stopsHTML}
      `;

      // Leaflet map
      if (routeMap) { routeMap.remove(); routeMap = null; }
      routeMap = L.map('map-div').setView(homeCoords, 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(routeMap);

      L.marker(homeCoords, {
        icon: L.divIcon({ className: '', html: '<div style="background:#000;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;">HEM</div>', iconSize: [40, 24], iconAnchor: [20, 12] })
      }).addTo(routeMap);

      schedules.forEach(s => {
        const color = colors[s.assigned_to] || '#737373';
        const filtered = filterStops(s.stops);
        const points = [homeCoords];

        filtered.forEach((stop, i) => {
          const coords = coordsForAddress(stop.address, stop.area_id);
          points.push(coords);
          const cust = DATA.customers.find(c => c.id === stop.customer_id);
          const order = DATA.orders.find(o => o.id === stop.order_id);
          const phone = cust?.phone ? `<br>&#128222; ${cust.phone}` : '';
          const knives = order?.estimated_knife_count || '?';

          L.marker(coords, {
            icon: L.divIcon({
              className: '',
              html: `<div style="background:${color};color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${i+1}</div>`,
              iconSize: [28, 28], iconAnchor: [14, 14]
            })
          }).bindPopup(`<strong>${stop.customer_name}</strong><br>${stop.address}${phone}<br>${stop.type==='pickup'?'Hämtning':'Leverans'} — ${knives} knivar<br><em>${stop.notes||''}</em>`).addTo(routeMap);
        });

        points.push(homeCoords);
        if (filtered.length) L.polyline(points, { color, weight: 3, opacity: 0.7, dashArray: '8 4' }).addTo(routeMap);
      });

      const allPts = [homeCoords, ...schedules.flatMap(s => filterStops(s.stops).map(st => coordsForAddress(st.address, st.area_id)))];
      if (allPts.length > 1) routeMap.fitBounds(allPts, { padding: [30, 30] });
    }

    function reassignStop(date, fromDriver, orderId, toDriver) {
      const fromSched = DATA.schedule.find(s => s.date === date && s.assigned_to === fromDriver);
      let toSched = DATA.schedule.find(s => s.date === date && s.assigned_to === toDriver);

      if (!fromSched) return;
      const stopIdx = fromSched.stops.findIndex(s => s.order_id === orderId);
      if (stopIdx === -1) return;

      const stop = fromSched.stops.splice(stopIdx, 1)[0];

      if (!toSched) {
        toSched = { date, assigned_to: toDriver, stops: [], estimated_total_time_min: 0, estimated_start: '', estimated_end: '', notes: '' };
        DATA.schedule.push(toSched);
      }
      toSched.stops.push(stop);

      // Re-optimize both routes
      const homeCoords = HOME_COORDS;
      fromSched.stops = optimizeRoute(fromSched.stops, homeCoords);
      toSched.stops = optimizeRoute(toSched.stops, homeCoords);

      // Update time estimates
      fromSched.estimated_total_time_min = fromSched.stops.length * 20 + 15;
      toSched.estimated_total_time_min = toSched.stops.length * 20 + 15;

      // Remove empty schedules
      DATA.schedule = DATA.schedule.filter(s => s.stops.length > 0);

      saveSchedule();
      renderRouteMapForDate(date);
    }

    function changeName(id) {
      const input = document.getElementById('name-' + id);
      const newName = input.value.trim();
      if (!newName) return;
      const user = USERS.find(u => u.id === id);
      if (user) {
        user.name = newName;
        if (user.id === CURRENT_USER.id) CURRENT_USER.name = newName;
        saveUsers();
        renderView('team');
      }
    }

    function changePin(id) {
      const input = document.getElementById('pin-' + id);
      const newPin = input.value.trim();
      if (newPin.length < 4) { alert('PIN måste vara minst 4 siffror'); return; }
      const conflict = USERS.find(u => u.pin === newPin && u.id !== id);
      if (conflict) { alert('PIN redan använd av ' + conflict.name); return; }
      const user = USERS.find(u => u.id === id);
      if (user) { user.pin = newPin; alert('PIN ändrad för ' + user.name); }
      if (user.id === CURRENT_USER.id) sessionStorage.setItem('knivslip_pin', newPin);
      saveUsers();
    }

    function changePay(id) {
      const payType = document.getElementById('paytype-' + id).value;
      const payRate = parseFloat(document.getElementById('payrate-' + id).value) || null;
      const user = USERS.find(u => u.id === id);
      if (user) {
        user.pay_type = payType || null;
        user.pay_rate = payRate;
        saveUsers();
        renderView('team');
      }
    }

    function changeRole(id, role) { const u = USERS.find(u=>u.id===id); if(u) { u.role = role; saveUsers(); } }
    function toggleUser(id) { const u = USERS.find(u=>u.id===id); if(u) { u.active = !u.active; saveUsers(); renderView('team'); } }
    function addUser() {
      const name = document.getElementById('new-name').value.trim();
      const pin = document.getElementById('new-pin').value.trim();
      const role = document.getElementById('new-role').value;
      const payType = document.getElementById('new-paytype').value || null;
      const payRate = parseFloat(document.getElementById('new-payrate').value) || null;
      if (!name || pin.length < 4) { alert('Fyll i namn och PIN (minst 4 siffror)'); return; }
      if (USERS.find(u => u.pin === pin)) { alert('PIN redan anvand — valj en annan'); return; }
      const id = 'USR-' + String(USERS.length + 1).padStart(3, '0');
      USERS.push({ id, name, pin, role, active: true, pay_type: payType, pay_rate: payRate, created_at: now() });
      saveUsers();
      renderView('team');

    function getSharpQueue() {
      return DATA.orders
        .filter(o => ['picked_up','registered','sharpening'].includes(o.status))
        .sort((a, b) => {
          // Leverans idag/imorgon = högst prioritet
          const aDelToday = a.delivery?.date === today() ? 0 : a.delivery?.date === tomorrow() ? 1 : 9;
          const bDelToday = b.delivery?.date === today() ? 0 : b.delivery?.date === tomorrow() ? 1 : 9;
          if (aDelToday !== bDelToday) return aDelToday - bDelToday;
          // Sen äldst pickup först
          const aDate = a.pickup?.completed_at || a.pickup?.date || a.created_at;
          const bDate = b.pickup?.completed_at || b.pickup?.date || b.created_at;
          return aDate.localeCompare(bDate);
        });
    }

      const container = document.getElementById(containerId);

        const deadline = daysAgo >= 2;

        // Kolla om leverans är planerad idag/imorgon

        const deliveryToday = deliveryDate === today();
