<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-kod — Knivkillarna</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .card { background:#fff; border-radius:16px; padding:3rem 2.5rem; text-align:center; max-width:400px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,0.1); }
    .logo { font-size:1.8rem; font-weight:900; letter-spacing:0.15em; color:#1a1a1a; margin-bottom:0.5rem; }
    .tagline { color:#888; font-size:0.95rem; margin-bottom:2rem; }
    .qr { margin:0 auto 1.5rem; }
    .qr img { width:250px; height:250px; border-radius:8px; }
    .cta { font-size:1.2rem; font-weight:700; color:#1a1a1a; margin-bottom:0.5rem; }
    .prices { color:#888; font-size:0.9rem; margin-bottom:1.5rem; line-height:1.6; }
    .prices strong { color:#e85d04; }
    .url { color:#e85d04; font-weight:700; font-size:1rem; letter-spacing:0.02em; }
    .area { color:#aaa; font-size:0.8rem; margin-top:1rem; }
    .print-btn { margin-top:2rem; background:#e85d04; color:#fff; border:none; padding:0.8rem 2rem; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; font-family:inherit; }
    .print-btn:hover { background:#d45003; }
    @media print {
      body { background:#fff; padding:0; }
      .card { box-shadow:none; border:2px solid #e0e0e0; }
      .print-btn { display:none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">KNIVKILLARNA</div>
    <p class="tagline">Mobil knivslipning i Nacka & Värmdö</p>

    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://knivkillarna.se/boka.html&margin=8" alt="QR-kod till bokningssidan">
    </div>

    <p class="cta">Skanna & boka slipning</p>
    <div class="prices">
      Från <strong>120 kr/kniv</strong><br>
      Vi hämtar & lämnar inom 2 dagar
    </div>
    <div class="url">knivkillarna.se</div>
    <p class="area">Nacka &bull; Saltsjöbaden &bull; Boo &bull; Gustavsberg &bull; Värmdö</p>

    <button class="print-btn" onclick="window.print()">Skriv ut</button>
  </div>
</body>
</html>
